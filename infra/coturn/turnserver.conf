# ── Ports ──────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# ── Auth ───────────────────────────────────────────────────
# Time-limited HMAC credentials (RFC 5766)
# static-auth-secret is passed via --static-auth-secret CLI flag
# so the secret stays out of this file and in your .env
use-auth-secret
realm=bluecall.com

# ── Relay port range ───────────────────────────────────────
min-port=49152
max-port=65535

# ── Security ───────────────────────────────────────────────
fingerprint
no-loopback-peers
no-multicast-peers

# ── Production: uncomment and set your server's public IP ──
# external-ip=YOUR_PUBLIC_IP
